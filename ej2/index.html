<!DOCTYPE html>

<head>

    <title>Ejercicio 2</title>
</head>
<body>

    <table>
        <thead>

                <th>ID</th>

                <th>Modelo</th>
                <th>Estado</th>
                <th>Uptime (dias)</th>
            </tr>
        </thead>
        <tbody id="body-table">
        </tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
