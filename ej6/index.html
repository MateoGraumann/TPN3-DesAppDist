<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 6</title>
</head>
<body>

    <h1>Simulación de Ping — Petición POST</h1>

    <form id="form-ping" onsubmit="enviarPing(event)">
        <label for="input_host">Host</label>
        <input type="text" id="input_host" name="host" placeholder="ej. 8.8.8.8" required>
        <button type="submit">Hacer ping</button>
    </form>

    <h2>Resultado</h2>
    <table>
        <thead>
            <tr>
                <th>Host</th>
                <th>Latencia (ms)</th>
                <th>Estado</th>
                <th>Estadísticas</th>
            </tr>
        </thead>
        <tbody id="body-table-ping">
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
