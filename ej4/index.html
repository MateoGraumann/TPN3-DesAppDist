<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
</head>
<body>

    <form id="form-vlans" onsubmit="filtrarVlans(event)">
        <label for="id">Buscar por nombre o segmento</label>
        <input type="text" id="input_busqueda" placeholder="Nombre o segmento" required>
        <button type="submit">Buscar</button>
    </form>

    <h1>Gestión de VLANs con Filtrado Local</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Segmento</th>
                <th>Cantidad de Dispositivos</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="body-table-vlans">
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
